<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FRP AR Asistanı</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      #ui-container {
        position: absolute;
        bottom: 10%; /* Ekranın alt kısmına sabitle */
        width: 100%;
        display: flex;
        justify-content: center;
        gap: 30px;
        z-index: 999; /* Kameranın ve 3D sahnenin en üstünde dursun */
      }
      button {
        padding: 15px 40px;
        font-size: 28px;
        font-weight: bold;
        border: none;
        border-radius: 15px;
        background-color: white;
        color: black;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      }
      button:active {
        background-color: #cccccc; /* Basılınca rengi hafif değişsin */
      }
    </style>
  </head>
  <body>

    <div id="ui-container">
      <button id="btn-minus">-</button>
      <button id="btn-plus">+</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: targets.mind;" renderer="colorManagement: true; antialias: false;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane color="black" opacity="0.8" position="0 0 0" height="0.4" width="0.8"></a-plane>
        <a-text id="hp-text" value="HP: 20" color="red" align="center" position="0 0 0.1" scale="1.5 1.5 1.5"></a-text>
      </a-entity>
    </a-scene>

    <script>
      // 1. Başlangıç can puanımızı tanımlıyoruz
      let currentHP = 20;

      // 2. HTML'deki yazıyı ve butonları bulup değişkenlere atıyoruz
      const hpText = document.querySelector('#hp-text');
      const btnPlus = document.querySelector('#btn-plus');
      const btnMinus = document.querySelector('#btn-minus');

      // 3. Artı butonuna tıklanınca ne olacak?
      btnPlus.addEventListener('click', () => {
        currentHP++; // Canı 1 artır
        hpText.setAttribute('value', 'HP: ' + currentHP); // Ekrana yeni canı yaz
      });

      // 4. Eksi butonuna tıklanınca ne olacak?
      btnMinus.addEventListener('click', () => {
        currentHP--; // Canı 1 azalt
        hpText.setAttribute('value', 'HP: ' + currentHP); // Ekrana yeni canı yaz
      });
    </script>

  </body>
</html>
